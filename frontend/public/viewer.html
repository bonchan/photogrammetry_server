<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D Volume Pro - Polygon Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 8px; width: 320px; border: 1px solid #444; z-index: 10; display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .toolbar { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 10px 0; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #444; }
        .btn.primary { background: #0078d7; border-color: #0078d7; font-size: 14px; }
        .btn.active { background: #00ff00; color: black; border-color: #00ff00; }
        #poly-container { flex-grow: 1; overflow-y: auto; border-top: 1px solid #444; padding-top: 10px; }
        .poly-item { background: #222; border: 1px solid #444; margin-bottom: 8px; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .poly-item.editing { border-color: #ffaa00; background: #332200; }
        .val { color: #00ff00; font-weight: bold; }
        .hint { color: #aaa; font-size: 11px; margin-bottom: 5px; }
        #draw-hint { background: #111; padding: 8px; border-radius: 4px; border-left: 3px solid #00ff00; font-size: 12px; margin-bottom: 10px; display: none; }
        #tooltip { position: absolute; background: rgba(0,255,0,0.9); color: black; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; pointer-events: none; display: none; z-index: 100; }
        .btn-icon { background: #444; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        .btn-icon.del { background: #cc3333; }
        #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); color: white; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="loading"><h1>Select a Dataset</h1></div>
    <div id="tooltip">Vol: 0</div>
    <div id="ui">
        <b>3D POLYGON STUDIO</b>
        <span class="hint">Left = Pan | Middle = Orbit | Hover = Vol</span>
        <div class="toolbar">
            <button id="btn-draw" class="btn primary">➕ Draw New Polygon</button>
        </div>
        <div id="draw-hint"></div>
        <div id="poly-container"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

        let scene, camera, renderer, controls, mesh, raycaster, mouse;
        let polygons = [], isDrawing = false, editingPolyId = null, currentPoints3D = [], currentLineMesh = null, hoveredPolyId = null, polyCounter = 0;

        const tooltip = document.getElementById('tooltip');
        const drawHint = document.getElementById('draw-hint');
        const loading = document.getElementById('loading');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.ROTATE, RIGHT: null };

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('click', onClick);
            window.addEventListener('dblclick', onDoubleClick);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);
            document.getElementById('btn-draw').addEventListener('click', toggleDrawMode);
            window.addEventListener('contextmenu', e => e.preventDefault());

            animate();
        }

        // --- NEW LOADING LOGIC FROM URLS ---
        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOAD_DATASET') {
                loadFromUrls(event.data.name);
            }
        });

        function loadFromUrls(datasetName) {
            loading.style.display = 'flex';
            loading.innerHTML = '<h1>Loading ' + datasetName + '...</h1>';
            
            const basePath = `/api/_outputs/${datasetName}_out/`;
            const mtlFile = 'model_decimated.mtl';
            const objFile = 'model_decimated.obj';

            const manager = new THREE.LoadingManager();
            const mtlLoader = new MTLLoader(manager);
            mtlLoader.setPath(basePath);

            mtlLoader.load(mtlFile, (materials) => {
                materials.preload();
                const objLoader = new OBJLoader(manager);
                objLoader.setMaterials(materials);
                objLoader.setPath(basePath);
                objLoader.load(objFile, (group) => {
                    setupLoadedModel(group);
                });
            }, undefined, () => {
                // Fallback if MTL fails
                const objLoader = new OBJLoader(manager);
                objLoader.setPath(basePath);
                objLoader.load(objFile, (group) => setupLoadedModel(group));
            });
        }

        function setupLoadedModel(group) {
            if (mesh) scene.remove(mesh.parent || mesh);
            polygons.forEach(p => scene.remove(p.lineMesh));
            polygons = [];
            updateUI();

            group.rotation.x = -Math.PI / 2;
            group.traverse(child => {
                if (child.isMesh) {
                    child.geometry = child.geometry.index ? child.geometry.toNonIndexed() : child.geometry;
                    child.geometry.computeVertexNormals();
                    mesh = child;
                    setupShader(child);
                }
            });
            scene.add(group);
            focusCamera(group);
            loading.style.display = 'none';
        }

        function setupShader(child) {
            child.material.onBeforeCompile = (shader) => {
                shader.uniforms.uPoly = { value: new Array(50).fill(new THREE.Vector2()) };
                shader.uniforms.uPolyLen = { value: 0 };
                shader.uniforms.uFloor = { value: -9999.0 };
                child.material.userData.shader = shader;
                shader.vertexShader = `varying vec3 vLocalPos;\n` + shader.vertexShader.replace(`#include <begin_vertex>`, `#include <begin_vertex>\nvLocalPos = position;`);
                shader.fragmentShader = `varying vec3 vLocalPos; uniform vec2 uPoly[50]; uniform int uPolyLen; uniform float uFloor;
                    bool isInside(vec2 pt) { bool c = false; for (int i=0, j=49; i<50; i++) { if (i>=uPolyLen) break; j=(i==0)?uPolyLen-1:i-1; if (((uPoly[i].y > pt.y) != (uPoly[j].y > pt.y)) && (pt.x < (uPoly[j].x - uPoly[i].x) * (pt.y - uPoly[i].y) / (uPoly[j].y - uPoly[i].y) + uPoly[i].x)) { c = !c; } } return c; }
                \n` + shader.fragmentShader.replace(`#include <dithering_fragment>`, `#include <dithering_fragment>
                    if (uPolyLen > 2 && vLocalPos.z > uFloor) { if (isInside(vLocalPos.xy)) { gl_FragColor = mix(gl_FragColor, vec4(0.0, 1.0, 0.0, gl_FragColor.a), 0.45); } }`);
            };
        }

        // --- MATH & TOOLS (Keep original) ---
        function recalculatePolygon(poly, isNew = false) {
            let sumZ = 0;
            poly.points3D.forEach(p => sumZ += p.z);
            poly.floorZ = sumZ / poly.points3D.length;
            poly.points2D = poly.points3D.map(p => new THREE.Vector2(p.x, p.y));
            poly.volume = calculateVolumeInPolygon(poly.points2D, poly.floorZ);
            if (poly.lineMesh) mesh.parent.remove(poly.lineMesh);
            const geo = new THREE.BufferGeometry().setFromPoints([...poly.points3D, poly.points3D[0]]);
            poly.lineMesh = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: (editingPolyId === poly.id) ? 0xffaa00 : 0x00ff00, linewidth: 3, depthTest: false }));
            poly.lineMesh.renderOrder = 999;
            mesh.parent.add(poly.lineMesh);
            if (isNew) polygons.push(poly);
            if (hoveredPolyId === poly.id) updateShader(poly);
        }

        function calculateVolumeInPolygon(poly2D, floorZ) {
            let volume = 0;
            const pos = mesh.geometry.attributes.position.array;
            for (let i = 0; i < pos.length / 9; i++) {
                const idx = i * 9;
                const cx = (pos[idx] + pos[idx + 3] + pos[idx + 6]) / 3;
                const cy = (pos[idx + 1] + pos[idx + 4] + pos[idx + 7]) / 3;
                if (pointInPolygon(new THREE.Vector2(cx, cy), poly2D)) {
                    const h1 = pos[idx + 2] - floorZ, h2 = pos[idx + 5] - floorZ, h3 = pos[idx + 8] - floorZ;
                    if (h1 > 0 || h2 > 0 || h3 > 0) {
                        const area = 0.5 * Math.abs(pos[idx] * (pos[idx + 4] - pos[idx + 7]) + pos[idx + 3] * (pos[idx + 7] - pos[idx + 1]) + pos[idx + 6] * (pos[idx + 1] - pos[idx + 4]));
                        volume += area * (Math.max(0, h1) + Math.max(0, h2) + Math.max(0, h3)) / 3;
                    }
                }
            }
            return volume;
        }

        function pointInPolygon(pt, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const intersect = ((poly[i].y > pt.y) != (poly[j].y > pt.y)) && (pt.x < (poly[j].x - poly[i].x) * (pt.y - poly[i].y) / (poly[j].y - poly[i].y) + poly[i].x);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function updateMouse(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onMouseMove(event) {
            if (!mesh || isDrawing || editingPolyId !== null) { tooltip.style.display = 'none'; return; }
            updateMouse(event);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mesh);
            let foundPoly = null;
            if (intersects.length > 0) {
                const localPoint = mesh.worldToLocal(intersects[0].point.clone());
                const pt2D = new THREE.Vector2(localPoint.x, localPoint.y);
                for (let p of polygons) { if (pointInPolygon(pt2D, p.points2D)) { foundPoly = p; break; } }
            }
            if (foundPoly) {
                tooltip.style.display = 'block';
                tooltip.style.left = (event.clientX + 15) + 'px';
                tooltip.style.top = (event.clientY + 15) + 'px';
                tooltip.innerHTML = `<b>Poly #${foundPoly.id}</b><br>Vol: ${foundPoly.volume.toLocaleString(undefined, { maximumFractionDigits: 2 })} units³`;
                if (hoveredPolyId !== foundPoly.id) { hoveredPolyId = foundPoly.id; updateShader(foundPoly); }
            } else {
                tooltip.style.display = 'none';
                if (hoveredPolyId !== null) { hoveredPolyId = null; updateShader(null); }
            }
        }

        function updateShader(poly) {
            if (!mesh.material.userData.shader) return;
            const uniforms = mesh.material.userData.shader.uniforms;
            if (!poly) { uniforms.uPolyLen.value = 0; return; }
            for (let i = 0; i < 50; i++) {
                if (i < poly.points2D.length) uniforms.uPoly[i].copy(poly.points2D[i]);
                else uniforms.uPoly[i].set(0, 0);
            }
            uniforms.uPolyLen.value = poly.points2D.length;
            uniforms.uFloor.value = poly.floorZ;
        }

        // --- BUTTON HANDLERS ---
        function toggleDrawMode() {
            if (!mesh) return alert("Load a model first.");
            isDrawing = !isDrawing;
            const btn = document.getElementById('btn-draw');
            if (isDrawing) {
                if (editingPolyId !== null) toggleEditMode(editingPolyId);
                btn.classList.add('active'); btn.innerText = "❌ Cancel Drawing";
                drawHint.innerHTML = `<span style="color:#00ff00;"><b>Draw Mode</b><br>Left-click: Add point<br>Double-click: Close Poly</span>`;
                drawHint.style.display = 'block';
            } else {
                btn.classList.remove('active'); btn.innerText = "➕ Draw New Polygon";
                if (currentLineMesh) mesh.parent.remove(currentLineMesh);
                currentLineMesh = null; currentPoints3D = []; drawHint.style.display = 'none';
            }
        }

        window.toggleEditMode = function(id) {
            editingPolyId = (editingPolyId === id) ? null : id;
            if (editingPolyId) isDrawing = false;
            polygons.forEach(p => { if (p.lineMesh) p.lineMesh.material.color.setHex((p.id === editingPolyId) ? 0xffaa00 : 0x00ff00); });
            updateUI();
        };

        window.deletePolygon = function(id) {
            const idx = polygons.findIndex(p => p.id === id);
            if (idx > -1) {
                mesh.parent.remove(polygons[idx].lineMesh);
                polygons.splice(idx, 1);
                updateUI();
            }
        };

        function onClick(event) {
            if (event.button !== 0 || !mesh || event.target.tagName === 'BUTTON') return;
            updateMouse(event);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mesh);
            if (intersects.length === 0) return;
            const pt = mesh.worldToLocal(intersects[0].point.clone());
            if (isDrawing) {
                currentPoints3D.push(pt);
                if (currentLineMesh) mesh.parent.remove(currentLineMesh);
                const geo = new THREE.BufferGeometry().setFromPoints(currentPoints3D.map(p => p.clone()));
                currentLineMesh = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2, depthTest: false }));
                mesh.parent.add(currentLineMesh);
            }
        }

        function onDoubleClick() {
            if (!isDrawing || currentPoints3D.length < 3) return;
            polyCounter++;
            recalculatePolygon({ id: polyCounter, points3D: currentPoints3D }, true);
            toggleDrawMode();
            updateUI();
        }

        function onMouseDown(event) {
            if (event.button === 2 && editingPolyId !== null && mesh) {
                // Original right-click delete vertex logic
                updateMouse(event);
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(mesh);
                if (intersects.length > 0) {
                    const pt = mesh.worldToLocal(intersects[0].point.clone());
                    const poly = polygons.find(p => p.id === editingPolyId);
                    if (poly.points3D.length > 3) {
                        let bestIdx = -1, minDistSq = Infinity;
                        for (let i = 0; i < poly.points3D.length; i++) {
                            let dSq = pt.distanceToSquared(poly.points3D[i]);
                            if (dSq < minDistSq) { minDistSq = dSq; bestIdx = i; }
                        }
                        poly.points3D.splice(bestIdx, 1);
                        recalculatePolygon(poly);
                        updateUI();
                    }
                }
            }
        }

        function updateUI() {
            const container = document.getElementById('poly-container');
            container.innerHTML = '';
            polygons.forEach(p => {
                const div = document.createElement('div');
                div.className = 'poly-item' + (editingPolyId === p.id ? ' editing' : '');
                div.innerHTML = `<div class="poly-info"><b>Poly #${p.id}</b><br>Vol: <span class="val">${p.volume.toLocaleString(undefined, { maximumFractionDigits: 1 })}</span></div>
                    <div class="poly-actions">
                        <button class="btn-icon" onclick="toggleEditMode(${p.id})">✎</button>
                        <button class="btn-icon del" onclick="deletePolygon(${p.id})">X</button>
                    </div>`;
                container.appendChild(div);
            });
        }

        function focusCamera(obj) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x + size.x, center.y + size.y, center.z + size.z);
            controls.target.copy(center);
            controls.update();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
